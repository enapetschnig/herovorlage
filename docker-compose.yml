name: heatflow

services:
  postgres:
    image: postgres:16-alpine
    container_name: heatflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: heatflow
      POSTGRES_PASSWORD: heatflow
      POSTGRES_DB: heatflow
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heatflow -d heatflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: heatflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: heatflow-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: heatflow_dev_master_key_change_me
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: heatflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: heatflow
      MINIO_ROOT_PASSWORD: heatflow123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: heatflow-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 heatflow heatflow123;
      mc mb --ignore-existing local/heatflow-files;
      mc mb --ignore-existing local/heatflow-documents;
      mc anonymous set download local/heatflow-files;
      exit 0;
      "

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: heatflow-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
  minio-data:
